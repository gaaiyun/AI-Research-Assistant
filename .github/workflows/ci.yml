name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # tabulate is an undeclared runtime dep of pandas.DataFrame.to_markdown()
          # used in comparison_analyzer.py / trend_analyzer.py; install it for the suite.
          pip install tabulate

      - name: Run tests
        run: python -m pytest tests/
